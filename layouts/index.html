{{ define "main" }}
  <h1>Welcome to My Blog</h1>
  <p>Explore sections:</p>
  <ul>
    <li><a href="{{ "/book-reco/" | relURL }}">Book Reco</a></li>
    <li><a href="{{ "/hn-stuff/" | relURL }}">HN Stuff</a></li>
    <li><a href="{{ "/random-thoughts/" | relURL }}">Random Thoughts</a></li>
    <li><a href="{{ "/looong-form/" | relURL }}">Looong Form</a></li>
  </ul>

  <p>Latest Posts:</p>
  <ul>
    {{ range first 10 .Site.RegularPages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a> - {{ .Date.Format "Jan 2, 2006" }}
      </li>
    {{ end }}
  </ul>
{{ end }}
